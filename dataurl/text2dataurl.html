<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text to Data URL Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2em;
      background-color: #f9f9f9;
      display: flex;
      flex-direction: column;
      /* align-items: center; */
    }
    textarea {
      width: 80%;
      max-width: 1000px;
      font-family: monospace;
      font-size: 14px;
      padding: 10px;
      margin-bottom: 1em;
      border: 1px solid #ccc;
      background-color: #fff;
      resize: vertical;
      overflow: auto;
    }
    #inputText {
      height: 16.5em; /* ~15 lines */
    }
    #output {
      width: 80%;
      max-width: 1000px;
      font-family: monospace;
      font-size: 18px;
      padding: 10px;
      border: 1px solid #ccc;
      background-color: #fff;
      resize: vertical;
      height: 11.5em; /* ~10 lines */
      overflow-y: auto;
      overflow-x: hidden;
      white-space: pre-wrap; /* wraps long lines */
      word-wrap: break-word;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 0 10px 20px 10px;
      cursor: pointer;
    }
    #status {
      color: green;
      font-style: italic;
      margin-top: 0.5em;
    }
    .section {
      border: 1px solid #ddd;
      padding: 20px;
      margin-bottom: 30px;
      background-color: #fff;
      border-radius: 8px;
      width: 80%;
      max-width: 1000px;
    }
    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      align-items: center;
    }
    select {
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    label {
      font-weight: bold;
      margin-right: 5px;
    }
    .font-controls {
      display: inline-flex;
      gap: 15px;
      align-items: center;
    }
  </style>
  <style>
    #preview-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    #preview-content {
      background: white;
      width: 80%;
      height: 80%;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      resize: both;
      overflow: auto;
      min-width: 400px;
      min-height: 300px;
    }
    #preview-header {
      padding: 15px 20px;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 8px 8px 0 0;
      cursor: move;
      user-select: none;
    }
    #preview-close {
      background: #ff5555;
      color: white;
      border: none;
      padding: 5px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    #preview-frame {
      flex: 1;
      border: none;
      width: 100%;
    }
  </style>
</head>
<body>
  <h1>Text to Data URL Converter</h1>

  <div class="section">
    <h2>Text to Data URL Plain Text, Rich Text</h2>
    <div class="controls">
      <label for="outputFormat">Output:</label>
      <select id="outputFormat">
        <option value="text/plain">data:text/plain</option>
        <option value="text/html">data:text/html</option>
      </select>

      <div class="font-controls" id="fontControls">
        <label for="fontName">Font:</label>
        <select id="fontName">
          <option value="Arial">Arial</option>
          <option value="Helvetica">Helvetica</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Courier New" selected>Courier New</option>
          <option value="Georgia">Georgia</option>
          <option value="Verdana">Verdana</option>
          <option value="Comic Sans MS">Comic Sans MS</option>
          <option value="Trebuchet MS">Trebuchet MS</option>
          <option value="Impact">Impact</option>
        </select>

        <label for="fontSize">Size:</label>
        <select id="fontSize">
          <option value="10">10px</option>
          <option value="12" selected>12px</option>
          <option value="14">14px</option>
          <option value="16">16px</option>
          <option value="18">18px</option>
          <option value="20">20px</option>
          <option value="24">24px</option>
          <option value="28">28px</option>
          <option value="32">32px</option>
          <option value="36">36px</option>
          <option value="48">48px</option>
        </select>
      </div>
    </div>
    <textarea id="inputText" placeholder="Paste your text here..."></textarea>
    <div>
      <button onclick="convertToDataURL()">Convert</button>
      <button onclick="copyToClipboard()">Copy to Clipboard</button>
      <button onclick="previewText()">Preview</button>
    </div>
    <textarea id="output" readonly></textarea>
    <div id="status"></div>
  </div>

  <!-- Preview Modal -->
  <div id="preview-modal" onclick="closePreview(event)">
    <div id="preview-content" onclick="event.stopPropagation()">
      <div id="preview-header">
        <h3 style="margin: 0;">Preview</h3>
        <button id="preview-close" onclick="closePreview()">Close</button>
      </div>
      <iframe id="preview-frame"></iframe>
    </div>
  </div>

  <script>
    let currentDataURL = '';
    let isDragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    // Make preview modal draggable
    document.addEventListener('DOMContentLoaded', function() {
      const header = document.getElementById('preview-header');
      const modal = document.getElementById('preview-content');

      header.addEventListener('mousedown', function(e) {
        isDragging = true;
        const rect = modal.getBoundingClientRect();
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (isDragging) {
          const newLeft = e.clientX - dragOffsetX;
          const newTop = e.clientY - dragOffsetY;
          modal.style.position = 'fixed';
          modal.style.left = newLeft + 'px';
          modal.style.top = newTop + 'px';
          modal.style.width = modal.offsetWidth + 'px';
          modal.style.height = modal.offsetHeight + 'px';
        }
      });

      document.addEventListener('mouseup', function() {
        isDragging = false;
      });
    });

    function convertToDataURL() {
      const text = document.getElementById('inputText').value;
      const outputFormat = document.getElementById('outputFormat').value;
      const fontName = document.getElementById('fontName').value;
      const fontSize = document.getElementById('fontSize').value;

      if (outputFormat === 'text/plain') {
        // Plain text conversion
        const base64 = btoa(unescape(encodeURIComponent(text)));
        currentDataURL = 'data:text/plain;base64,' + base64;
      } else {
        // Rich text HTML conversion with embedded controls
        const htmlContent = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .controls {
      background: #f0f0f0;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 5px;
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }
    label {
      font-weight: bold;
      margin-right: 5px;
    }
    select {
      padding: 5px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    #content {
      font-family: '${fontName}', sans-serif;
      font-size: ${fontSize}px;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="controls">
    <div>
      <label for="fontSelect">Font:</label>
      <select id="fontSelect" onchange="updateFont()">
        <option value="Arial" ${fontName === 'Arial' ? 'selected' : ''}>Arial</option>
        <option value="Helvetica" ${fontName === 'Helvetica' ? 'selected' : ''}>Helvetica</option>
        <option value="Times New Roman" ${fontName === 'Times New Roman' ? 'selected' : ''}>Times New Roman</option>
        <option value="Courier New" ${fontName === 'Courier New' ? 'selected' : ''}>Courier New</option>
        <option value="Georgia" ${fontName === 'Georgia' ? 'selected' : ''}>Georgia</option>
        <option value="Verdana" ${fontName === 'Verdana' ? 'selected' : ''}>Verdana</option>
        <option value="Comic Sans MS" ${fontName === 'Comic Sans MS' ? 'selected' : ''}>Comic Sans MS</option>
        <option value="Trebuchet MS" ${fontName === 'Trebuchet MS' ? 'selected' : ''}>Trebuchet MS</option>
        <option value="Impact" ${fontName === 'Impact' ? 'selected' : ''}>Impact</option>
      </select>
    </div>
    <div>
      <label for="sizeSelect">Size:</label>
      <select id="sizeSelect" onchange="updateFont()">
        <option value="10" ${fontSize === '10' ? 'selected' : ''}>10px</option>
        <option value="12" ${fontSize === '12' ? 'selected' : ''}>12px</option>
        <option value="14" ${fontSize === '14' ? 'selected' : ''}>14px</option>
        <option value="16" ${fontSize === '16' ? 'selected' : ''}>16px</option>
        <option value="18" ${fontSize === '18' ? 'selected' : ''}>18px</option>
        <option value="20" ${fontSize === '20' ? 'selected' : ''}>20px</option>
        <option value="24" ${fontSize === '24' ? 'selected' : ''}>24px</option>
        <option value="28" ${fontSize === '28' ? 'selected' : ''}>28px</option>
        <option value="32" ${fontSize === '32' ? 'selected' : ''}>32px</option>
        <option value="36" ${fontSize === '36' ? 'selected' : ''}>36px</option>
        <option value="48" ${fontSize === '48' ? 'selected' : ''}>48px</option>
      </select>
    </div>
  </div>
  <div id="content">${escapeHtml(text)}</div>
  <script>
    function updateFont() {
      const content = document.getElementById('content');
      const font = document.getElementById('fontSelect').value;
      const size = document.getElementById('sizeSelect').value;
      content.style.fontFamily = "'" + font + "', sans-serif";
      content.style.fontSize = size + 'px';
    }
  <\/script>
</body>
</html>`;
        const base64 = btoa(unescape(encodeURIComponent(htmlContent)));
        currentDataURL = 'data:text/html;base64,' + base64;
      }

      document.getElementById('output').value = currentDataURL;
      document.getElementById('status').innerText = '';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function copyToClipboard() {
      if (!currentDataURL) {
        document.getElementById('status').innerText = 'Please convert text first.';
        return;
      }
      navigator.clipboard.writeText(currentDataURL)
        .then(() => {
          document.getElementById('status').innerText = 'Copied to clipboard!';
        })
        .catch(err => {
          document.getElementById('status').innerText = 'Failed to copy.';
          console.error('Clipboard error:', err);
        });
    }

    function previewText() {
      if (!currentDataURL) {
        document.getElementById('status').innerText = 'Please convert text first.';
        return;
      }
      // Show modal with iframe preview
      const modal = document.getElementById('preview-modal');
      const iframe = document.getElementById('preview-frame');
      iframe.src = currentDataURL;
      modal.style.display = 'flex';
    }

    function closePreview(event) {
      const modal = document.getElementById('preview-modal');
      modal.style.display = 'none';
      document.getElementById('preview-frame').src = '';
    }
  </script>
</body>
</html>
